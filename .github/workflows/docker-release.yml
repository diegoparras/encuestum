name: Publish image

# Publica la imagen all-in-one de Encuestum en GitHub Container Registry:
#   ghcr.io/diegoparras/encuestum:latest   (y el tag de cada release)
#
# Se dispara a mano (Actions -> Publish image -> Run workflow), al publicar un
# release, o al pushear una rama release/* (p.ej. release/0.1.0). Tras el PRIMER
# push, hacé el package publico para que EasyPanel lo pullee sin credenciales:
#   github.com/users/diegoparras/packages -> encuestum -> Package settings
#   -> Change visibility -> Public

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - "release/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/diegoparras/encuestum

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=match,pattern=release/(\d+\.\d+\.\d+),group=1

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

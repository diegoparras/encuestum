worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  client_max_body_size 25M;
  sendfile on;

  server {
    listen 80;
    server_name _;

    # Next.js frontend (standalone server on :3000)
    location / {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      # Preserve host:port so Next.js redirects/absolute URLs keep the port.
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 5m;
      proxy_connect_timeout 5m;
    }

    # FastAPI backend (:8000) — covers /api/v1/survey/* and /api/health
    location /api/ {
      client_max_body_size 60M;
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 5m;
      proxy_connect_timeout 5m;
    }

    # Uploaded assets (survey design images/audio), served by FastAPI static mount.
    location /assets/ {
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
      expires 7d;
      add_header Cache-Control "public";
    }

    # API docs (optional, handy)
    location /docs {
      proxy_pass http://127.0.0.1:8000/docs;
      proxy_set_header Host $host;
    }
    location /openapi.json {
      proxy_pass http://127.0.0.1:8000/openapi.json;
      proxy_set_header Host $host;
    }
  }
}

services:
  backend:
    build: ./backend
    environment:
      # Base de datos: SQLite persistida en el volumen (o poné DATABASE_URL).
      ENCUESTUM_DATA_DIR: /data
      # Proveedor LLM (OpenAI-compatible). Bring-your-own-key.
      ENCUESTUM_LLM_API_KEY: ${ENCUESTUM_LLM_API_KEY:-}
      ENCUESTUM_LLM_BASE_URL: ${ENCUESTUM_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      ENCUESTUM_LLM_MODEL: ${ENCUESTUM_LLM_MODEL:-openai/gpt-4o-mini}
      # Gate admin opcional.
      ENCUESTUM_ADMIN_TOKEN: ${ENCUESTUM_ADMIN_TOKEN:-}
    volumes:
      - encuestum_data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  encuestum_data:
